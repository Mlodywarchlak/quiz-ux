<script>
const DATA=[{"section": "Podstawy UX (18.10.2025)", "q": "2. Podstawowa różnica między Omnichannel a Multichannel jest:", "a": ["zasięg", "integracja kanałów", "nazwa", "kraje, na których występuje produkt"], "correct": 1}, {"section": "Podstawy UX (18.10.2025)", "q": "3. Multichannel to:", "a": ["Obecność klienta w wielu kanałach sprzedaży lub komunikacji, które działają zależnie od siebie.", "Obecność klienta w wielu kanałach sprzedaży lub komunikacji, które działają niezależnie od siebie.", "Strategia, gdzie klient ma tylko sklepy stacjonarne i online.", "Strategia, która integruje wszystkie kanały, tworząc jedno, spójne doświadczenie zakupowe dla klienta."], "correct": 1}, {"section": "Podstawy UX (18.10.2025)", "q": "4. Czy kontekst zmienia doświadczenie użytkownika?", "a": ["nie", "tak"], "correct": 1}, {"section": "Podstawy UX (18.10.2025)", "q": "5. Dzięki UX nie możemy:", "a": ["Zwiększyć lojalność klientów", "Zmniejszyc koszt onboardingu", "Zwiększyć konwersje", "Zmusić użytkowników do używania aplikacji"], "correct": 3}, {"section": "Podstawy UX (18.10.2025)", "q": "6. Jakie są etapy procesu projektowego w tzw. teorii?", "a": ["Wywiady, analizy, raport, ocena.", "Planowanie, budżetowanie, wdrożenie.", "Projektowanie, testowanie.", "Empatyzacja, definicja, ideacja, prototypowanie, testowanie."], "correct": 3}, {"section": "Podstawy UX (18.10.2025)", "q": "7. Etap empatyzacji w procesie projektowym to:", "a": ["Tworzenie prototypu.", "Próba stworzenia konceptu.", "Zrozumienie obszaru problemowego i eksploracja tematu.", "Walidowanie pomysłów."], "correct": 2}, {"section": "Podstawy UX (18.10.2025)", "q": "8. Sklep internetowy używa innego stylu przycisków na każdej podstronie. Która heurystyka Nielsena została złamana?", "a": ["Zadbaj o pomoc i dokumentację.", "Trzymaj się standardów i zachowaj spójność.", "Daj użytkownikowi pełna kontrolę.", "Zapobiegaj błędom."], "correct": 1}, {"section": "Podstawy UX (18.10.2025)", "q": "9. Na stronie sklepu widoczny jest pasek “Krok 1 z 3”. Która heurystyka Nielsena została tutaj zastosowana?", "a": ["Zapobiegaj błędom.", "Dbaj o estetykę i umiar.", "Pokazuj status systemu.", "Zadbaj o pomoc i dokumentację."], "correct": 2}, {"section": "Podstawy UX (18.10.2025)", "q": "10. Dobry UX opłaca się firmom ponieważ:", "a": ["Użytkownicy są szczęśliwi.", "Zwiększa przychód i zmniejsza koszty.", "Strona/aplikacja wygląda ładniej."], "correct": 1}, {"section": "Typy badań w cyklu życia produktu (18.10.2025)", "q": "2. Dzięki badaniu jakościowemu nie dowiemy się:", "a": ["Ile osób ma problem z danym błędem", "Jak trudne jest dokonanie zakupu", "Skąd użytkownik zna marke", "Dlaczego wersja “A” jest lepsza od wersji “B”"], "correct": 0}, {"section": "Typy badań w cyklu życia produktu (18.10.2025)", "q": "3. Kiedy stosujemy Tree testing, zamiast Card Sortingu?", "a": ["Kiedy chcemy sprawdzić czy nasze nazewnictwo pokrywa się z nazewnictwem, które nadałby użytkownik", "Kiedy chcemy przetestować obecne drzewo strony", "Kiedy chcemy nadać nazwy w architekturze informacji", "Kiedy chcemy zmieniać nazwy w architekturze informacji"], "correct": 1}, {"section": "Typy badań w cyklu życia produktu (18.10.2025)", "q": "4. Jakie są fazy cyklu produktu?", "a": ["Wprowadzenie, wzrost, zgon, zmartwychwstanie", "Wprowadzenie, wzrost, dojrzałość, ekspansja", "Wzrost, dojrzałość, spadek, wtórny wzrost", "Wprowadzenie, wzrost, dojrzałość, spadek"], "correct": 3}, {"section": "Typy badań w cyklu życia produktu (18.10.2025)", "q": "5. Jaki jest trzeci etap procesu Double Diamond?", "a": ["Discover", "Define", "Develop", "Deliver"], "correct": 2}, {"section": "Typy badań w cyklu życia produktu (18.10.2025)", "q": "6. Badania dzienniczkowe pozwalają na:", "a": ["Odkrycie jak użytkownicy odbierają i używają produkt w swoim naturalnym otoczeniu.", "Przeprowadzenie wywiadów grupowych.", "Testowanie prototypów.", "Zbieranie danych ilościowych."], "correct": 0}, {"section": "Typy badań w cyklu życia produktu (18.10.2025)", "q": "7. Czego dowiemy się dzięki badaniu jakościowemu?", "a": ["Ilu użytkowników ma dany problem.", "Dlaczego użytkownicy zachowują się w określony sposób np. dlaczego wersja A jest lepsza niż B.", "Jaki procent użytkowników ukończyło zadanie.", "Ile czasu użytkownik spędza na stronie."], "correct": 1}, {"section": "Typy badań w cyklu życia produktu (18.10.2025)", "q": "8. Indywidualne wywiady pogłębione stosujemy w celu:", "a": ["Żadne z powyższych.", "Odkrycia jak użytkownicy używają produkt w naturalnym otoczeniu.", "Wymiany doświadczeń i opinii.", "Wejścia w to, co użytkownik pierwotnie ukrywa lub sam nie jest świadomy."], "correct": 3}, {"section": "Typy badań w cyklu życia produktu (18.10.2025)", "q": "9. Badania ilościowe pozwalają na:", "a": ["Poznanie postaw.", "Poznanie emocji i motywacji.", "Poznanie deklaracji.", "Poznanie skali problemu np. ile osób woli wersję A, a ile wersję B."], "correct": 3}, {"section": "Typy badań w cyklu życia produktu (18.10.2025)", "q": "10. Testy A/B stosujemy przy dojrzałych produktach, w których możemy sprawdzić, jak małe zmiany wpływają na wybrane przez nas wskaźniki.", "a": ["Fałsz", "Prawda"], "correct": 1}, {"section": "Audyt UX (19.10.2025 i 22.11.2025)", "q": "2. Czy sa inne heurystyki niż 10 Heurystyk Nielsena?", "a": ["nie", "tak"], "correct": 1}, {"section": "Audyt UX (19.10.2025 i 22.11.2025)", "q": "3. Błąd użyteczności, który nie pozwala przejść użytkownikowi dalej to:", "a": ["rekomendacja", "Błąd mały", "błąd krytyczny", "Błąd średni"], "correct": 2}, {"section": "Formułowanie problemów i hipotez badawczych (19.10.2025 i 22.11.2025)", "q": "2. Które zdanie jest fałszywe jeśli chodzi o cele badawcze:", "a": ["są pytaniami", "Dzielimy je na główne i uszczegóławiające", "są zdaniami twierdzącymi", "często powstają z pytań od interesariuszy"], "correct": 0}, {"section": "Formułowanie problemów i hipotez badawczych (19.10.2025 i 22.11.2025)", "q": "3. Najpierw tworzymy pytania badawcze a potem cele badawcze", ów mimo braku czasu", "Pełne poleganie na AI — wyniki są wystarczająco dokładne bez weryfikacji", "Analiza tylko 5 losowych wywiadów ręcznie, reszta przez AI bez przeglądu", "Użycie AI do wstępnego kodowania, a potem ręczna weryfikacja przez badacza"], "correct": 3}];
const L=['A','B','C','D','E','F'];
let pool=[],cur=0,nOK=0,nBad=0,wrongIds=[],mode='all',secF='';
function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
function getPool(){
  let b=DATA.map((q,i)=>({...q,id:i}));
  if(secF)b=b.filter(q=>q.section===secF);
  if(mode==='wrong')b=b.filter(q=>wrongIds.includes(q.id));
  if(mode==='random20')b=shuffle(b).slice(0,20);
  return shuffle(b);
}
function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active',['all','random20','wrong'][i]===m));
  restart();
}
function filterSection(){secF=document.getElementById('sf').value;restart();}
function restart(){
  pool=getPool();cur=0;nOK=0;nBad=0;
  if(mode!=='wrong')wrongIds=[];
  document.getElementById('result').classList.remove('on');
  upd();render();
}
function upd(){
  const d=nOK+nBad;
  document.getElementById('s-total').textContent=pool.length;
  document.getElementById('s-done').textContent=d;
  document.getElementById('s-ok').textContent=nOK;
  document.getElementById('s-bad').textContent=nBad;
  document.getElementById('s-pct').textContent=d>0?Math.round(nOK/d*100)+'%':'—';
  const p=pool.length>0?Math.round(cur/pool.length*100):0;
  document.getElementById('progress').style.width=p+'%';
  document.getElementById('prog-text').textContent='Pytanie '+cur+' z '+pool.length;
  document.getElementById('prog-pct').textContent=p+'%';
}
function render(){
  const area=document.getElementById('quiz-area');
  if(cur>=pool.length){showResult();return;}
  const q=pool[cur];
  const opts=q.a.map((t,i)=>'<div class="opt" id="o'+i+'" onclick="pick('+i+','+q.correct+','+q.id+')"><div class="opt-letter">'+L[i]+'</div><div>'+t+'</div></div>').join('');
  const sec=q.section.replace(/\s*\(.*?\)/g,'').trim().substring(0,42);
  area.innerHTML='<div class="card"><div class="section-tag">'+sec+'</div><div class="q-num">Pytanie '+(cur+1)+' / '+pool.length+'</div><div class="q-text">'+q.q+'</div><div class="options">'+opts+'</div><div class="feedback" id="fb"></div><div class="nav"><button class="btn btn-reset" onclick="restart()">&#8635; Reset</button><button class="btn btn-next" id="btn-next" disabled onclick="next()">Nast&#281;pne &rarr;</button></div></div>';
  upd();
}
function pick(idx,correct,qId){
  document.querySelectorAll('.opt').forEach(o=>o.classList.add('disabled'));
  const fb=document.getElementById('fb');fb.style.display='block';
  if(idx===correct){nOK++;document.getElementById('o'+idx).classList.add('correct');fb.className='feedback correct';fb.innerHTML='&#9989; <strong>Poprawnie!</strong>';}
  else{nBad++;if(!wrongIds.includes(qId))wrongIds.push(qId);document.getElementById('o'+idx).classList.add('wrong');document.getElementById('o'+correct).classList.add('correct');fb.className='feedback wrong';fb.innerHTML='&#10060; <strong>B&#322;&#261;d.</strong> Poprawna: <span style="color:#34d399">'+pool[cur].a[correct]+'</span>';}
  document.getElementById('btn-next').disabled=false;upd();
}
function next(){cur++;render();}
function showResult(){
  document.getElementById('quiz-area').innerHTML='';
  document.getElementById('result').classList.add('on');
  const t=pool.length,p=Math.round(nOK/t*100);
  document.getElementById('r-score').textContent=nOK+'/'+t;
  document.getElementById('r-pct').textContent=p+'% poprawnych';
  const msgs=[['&#128170;','Warto powtórzyć materiał. Kliknij "Powtórz błędne".'],['&#128218;','Dobry start! Ćwicz słabsze tematy korzystając z filtra.'],['&#127919;','Bardzo dobrze! Jeszcze chwila nauki i będziesz gotowy.'],['&#127942;','Wybitnie! Jesteś gotowy na egzamin!']];
  const lv=p>=90?3:p>=75?2:p>=60?1:0;
  document.getElementById('r-emoji').innerHTML=msgs[lv][0];
  document.getElementById('r-msg').textContent=msgs[lv][1];
  const mq=pool.filter(q=>wrongIds.includes(q.id));
  document.getElementById('missed-list').innerHTML=mq.length?'<h3>&#10060; Błędne ('+mq.length+')</h3>'+mq.map(q=>'<div class="missed-item"><strong>'+q.q.substring(0,100)+'</strong><span>&#9989; '+q.a[q.correct]+'</span></div>').join(''):'';
  document.getElementById('progress').style.width='100%';
}
restart();
</script>
