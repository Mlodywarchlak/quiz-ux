<html lang="pl">
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#080818;color:#e0e0ff;min-height:100vh}
.header{background:linear-gradient(135deg,#12012e,#0a1a46);padding:32px 20px 24px;text-align:center;border-bottom:1px solid rgba(167,139,250,.2)}
.header h1{font-size:2rem;font-weight:800;background:linear-gradient(90deg,#a78bfa,#60a5fa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.header p{color:#7777aa;font-size:.9rem}
.stats{display:flex;gap:12px;justify-content:center;margin-top:18px;flex-wrap:wrap}
.stat{background:rgba(255,255,255,.05);border:1px solid rgba(167,139,250,.25);border-radius:12px;padding:10px 20px;text-align:center;min-width:80px}
.stat-val{font-size:1.6rem;font-weight:700;color:#a78bfa}
.stat-label{font-size:.7rem;color:#7777aa;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.toolbar{max-width:860px;margin:24px auto 0;padding:0 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.mode-btn{padding:7px 16px;border-radius:99px;border:1.5px solid rgba(167,139,250,.3);background:transparent;color:#a78bfa;font-family:inherit;font-size:.82rem;cursor:pointer;transition:all .2s}
.mode-btn.active,.mode-btn:hover{background:rgba(167,139,250,.2);border-color:#a78bfa}
.filter-select{padding:7px 12px;border-radius:99px;border:1.5px solid rgba(167,139,250,.3);background:#0d0d22;color:#a78bfa;font-family:inherit;font-size:.82rem;cursor:pointer;outline:none}
.container{max-width:860px;margin:0 auto;padding:20px}
.progress-wrap{margin-bottom:20px}
.progress-bar{background:rgba(255,255,255,.08);border-radius:99px;height:5px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#a78bfa,#60a5fa);border-radius:99px;transition:width .4s}
.prog-label{font-size:.75rem;color:#6666aa;margin-bottom:6px;display:flex;justify-content:space-between}
.card{background:linear-gradient(135deg,rgba(20,4,50,.85),rgba(10,22,70,.85));border:1px solid rgba(167,139,250,.18);border-radius:20px;padding:28px;margin-bottom:16px;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.section-tag{display:inline-block;font-size:.7rem;color:#60a5fa;background:rgba(96,165,250,.12);border:1px solid rgba(96,165,250,.25);border-radius:99px;padding:3px 10px;margin-bottom:12px;letter-spacing:.5px}
.q-num{font-size:.75rem;color:#a78bfa;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px}
.q-text{font-size:1.08rem;font-weight:600;line-height:1.6;color:#eaeaff;margin-bottom:22px}
.options{display:flex;flex-direction:column;gap:10px}
.opt{display:flex;align-items:flex-start;gap:14px;padding:13px 16px;background:rgba(255,255,255,.04);border:1.5px solid rgba(167,139,250,.14);border-radius:12px;cursor:pointer;transition:all .2s;font-size:.93rem;line-height:1.45}
.opt:hover{background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.4);transform:translateX(3px)}
.opt.correct{background:rgba(52,211,153,.14);border-color:#34d399;color:#34d399}
.opt.wrong{background:rgba(239,68,68,.13);border-color:#ef4444;color:#ef4444}
.opt.disabled{cursor:default;transform:none!important}
.opt-letter{width:30px;height:30px;min-width:30px;border-radius:8px;background:rgba(167,139,250,.18);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;color:#a78bfa;flex-shrink:0;margin-top:1px}
.opt.correct .opt-letter{background:rgba(52,211,153,.25);color:#34d399}
.opt.wrong .opt-letter{background:rgba(239,68,68,.25);color:#ef4444}
.feedback{margin-top:14px;padding:13px 16px;border-radius:12px;font-size:.88rem;display:none;line-height:1.5}
.feedback.correct{background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.4);color:#34d399}
.feedback.wrong{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.4);color:#ef4444}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:18px;gap:10px}
.btn{padding:11px 26px;border:none;border-radius:12px;font-family:inherit;font-size:.92rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-next{background:linear-gradient(135deg,#a78bfa,#60a5fa);color:#fff;margin-left:auto}
.btn-next:hover{opacity:.88;transform:translateY(-1px)}
.btn-next:disabled{opacity:.35;cursor:default;transform:none}
.btn-reset{background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.25);color:#a78bfa}
.btn-reset:hover{background:rgba(167,139,250,.22)}
.result{display:none;text-align:center;padding:60px 20px}
.result.on{display:block;animation:fadeIn .5s}
.r-emoji{font-size:5rem;margin-bottom:16px}
.r-score{font-size:3.5rem;font-weight:800;background:linear-gradient(90deg,#a78bfa,#60a5fa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.r-pct{font-size:1.1rem;color:#7777aa;margin-top:4px}
.r-msg{margin-top:20px;font-size:1rem;color:#c0c0e0;max-width:480px;margin-left:auto;margin-right:auto;line-height:1.65}
.missed{margin-top:30px;text-align:left;max-width:600px;margin-left:auto;margin-right:auto}
.missed h3{font-size:.85rem;color:#7777aa;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.missed-item{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:10px 14px;margin-bottom:8px;font-size:.85rem}
.missed-item strong{color:#ef4444;display:block;margin-bottom:4px}
.missed-item span{color:#34d399}
</style>
</head>
<body>
<div class="header">
  <h1>🎓 Quiz UX — Egzamin</h1>
  <p>84 pytania z Twoich materiałów • wybierz tryb i temat</p>
  <div class="stats">
    <div class="stat"><div class="stat-val" id="s-total">84</div><div class="stat-label">Pytań</div></div>

    <div class="stat"><div class="stat-val" id="s-ok" style="color:#34d399">0</div><div class="stat-label">Poprawne</div></div>

<div class="toolbar">
  <button class="mode-btn active" onclick="setMode('all')">Wszystkie (84)</button>
  <button class="mode-btn" onclick="setMode('random20')">Losowe 20</button>

  <select class="filter-select" id="section-filter" onchange="filterSection()">
    <option value="">Wszystkie tematy</option>
  </select>
</div>

<div class="container">
  <div class="progress-wrap">
    <div class="prog-label"><span id="prog-text">Pytanie 0 z 0</span><span id="prog-pct">0%</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
  </div>
  <div id="quiz-area"></div>
  <div class="result" id="result">
    <div class="r-emoji" id="r-emoji">🏆</div>
    <div class="r-score" id="r-score">0/0</div>
    <div class="r-pct" id="r-pct"></div>
    <div class="r-msg" id="r-msg"></div>
    <div class="missed" id="missed-list"></div>
    <br><br>
    <button class="btn btn-reset" onclick="restart()">🔄 Zacznij od nowa</button>
    <button class="btn btn-reset" style="margin-left:10px" onclick="setMode('wrong')">📚 Powtórz błędne</button>
  </div>
</div>

025)", "q": "7. Czego dowiemy się dzięki badaniu jakościowemu?", "a": ["Ilu użytkowników ma dany problem.", "Dlaczego użytkownicy zachowują się w określony sposób np. dlaczego wersja A jest lepsza niż B.", "Jaki procent użytkowników ukończyło zadanie.", "Ile czasu użytkownik spędza na stronie."], "correct": 1}, {"section": "Typy badań w cyklu życia produktu (18.10.2025)", "q": "8. Indywidualne wywiady pogłębione stosujemy w celu:", "a": ["Wymiany doświadczeń i opinii.", "Wejścia w to, co użytkownik pierwotnie ukrywa lub sam nie jest świadomy.", "Odkrycia jak użytkownicy używają produkt w naturalnym otoczeniu.", "Żadne z powyższych."], "correct": 1}, {"section": "Typy badań w cyklu życia produktu (18.10.2025)", "q": "9. Badania ilościowe pozwalają na:", "a": ["Poznanie skali problemu np. ile osób woli wersję A, a ile wersję B.", "Poznanie postaw.", "Poznanie emocji i motywacji.", "Poznanie deklaracji."], "correct": 0}, {"section": "Typy badań w cyklu życia produktu (18.10.2025)", "q": "10. Testy A/B stosujemy przy dojrzałych produktach, w których możemy sprawdzić, jak małe zmiany wpływają na wybrane przez nas wskaźniki.", "a": ["Prawda", "Fałsz"], "correct": 0}, {"section": "Audyt UX (19.10.2025 i 22.11.2025)", "q": "2. Czy sa inne heurystyki niż 10 Heurystyk Nielsena?", "a": ["tak", "nie"], "correct": 0}, {"section": "Audyt UX (19.10.2025 i 22.11.2025)", "q": "3. Błąd użyteczności, który nie pozwala przejść użytkownikowi dalej to:", "a": ["Błąd mały", "Błąd średni", "błąd krytyczny", "rekomendacja"], "correct": 2}, {"section": "Formułowanie problemów i hipotez badawczych (19.10.2025 i 22.11.2025)", "q": "2. Które zdanie jest fałszywe jeśli chodzi o cele badawcze:", "a": ["są zdaniami twierdzącymi", "są pytaniami", "często powstają z pytań od interesariuszy", "Dzielimy je na główne i uszczegóławiające"], "correct": 1}, {"section": "Formułowanie problemów i hipotez badawczych (19.10.2025 i 22.11.2025)", "q": "3. Najpierw tworzymy pytania badawcze a potem cele badawcze let pool=[], current=0, nOK=0, nBad=0, wrongIds=[], mode='all', sectionFilter='';

// Build section select
const sections=[...new Set(DATA.map(q=>q.section))];
const sel=document.getElementById('section-filter');
sections.forEach(s=>{
  const o=document.createElement('option');
  o.value=s; o.textContent=s.replace(/\s*\(.*\)/,'').trim().substring(0,40);
  sel.appendChild(o);
});

function shuffle(arr){return [...arr].sort(()=>Math.random()-.5)}

function getPool(){
  let base=DATA.map((q,i)=>({...q,id:i}));
  if(sectionFilter) base=base.filter(q=>q.section===sectionFilter);
  if(mode==='wrong') base=base.filter(q=>wrongIds.includes(q.id));
  if(mode==='random20') base=shuffle(base).slice(0,20);
  return shuffle(base);
}

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach((b,i)=>{
    b.classList.toggle('active',['all','random20','wrong'][i]===m);
  });
  restart();
}

function filterSection(){
  sectionFilter=document.getElementById('section-filter').value;
  restart();
}

function restart(){
  pool=getPool(); current=0; nOK=0; nBad=0;
  if(mode!=='wrong') wrongIds=[];
  document.getElementById('result').classList.remove('on');
  updateStats();
  render();
}

function updateStats(){
  const done=nOK+nBad;
  document.getElementById('s-total').textContent=pool.length;
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-ok').textContent=nOK;
  document.getElementById('s-bad').textContent=nBad;
  document.getElementById('s-pct').textContent=done>0?Math.round(nOK/done*100)+'%':'—';
  const pct=pool.length>0?Math.round(current/pool.length*100):0;
  document.getElementById('progress').style.width=pct+'%';
  document.getElementById('prog-text').textContent=`Pytanie ${current} z ${pool.length}`;
  document.getElementById('prog-pct').textContent=pct+'%';
}

function render(){
  const area=document.getElementById('quiz-area');
  if(current>=pool.length){showResult();return;}
  const q=pool[current];
  const letters=['A','B','C','D','E','F'];
  const opts=q.a.map((t,i)=>`
    <div class="opt" id="o${i}" onclick="pick(${i},${q.correct},${q.id},'${t.replace(/'/g,"\'")}')">
      <div class="opt-letter">${letters[i]}</div><div>${t}</div>
    </div>`).join('');
  
  const shortSection=q.section.replace(/\s*\(.*\)/,'').trim();
  area.innerHTML=`<div class="card">
    <div class="section-tag">${shortSection}</div>
    <div class="q-num">Pytanie ${current+1} / ${pool.length}</div>
    <div class="q-text">${q.q}</div>
    <div class="options">${opts}</div>
    <div class="feedback" id="fb"></div>
    <div class="nav">
      <button class="btn btn-reset" onclick="restart()">↺ Reset</button>
      <button class="btn btn-next" id="btn-next" disabled onclick="next()">Następne →</button>
    </div>
  </div>`;
  updateStats();
}

function pick(idx, correct, qId, answerText){
  document.querySelectorAll('.opt').forEach(o=>o.classList.add('disabled'));
  const fb=document.getElementById('fb');
  fb.style.display='block';
  if(idx===correct){
    nOK++;
    document.getElementById('o'+idx).classList.add('correct');
    fb.className='feedback correct';
    fb.innerHTML='✅ <strong>Poprawnie!</strong>';
  } else {
    nBad++;
    if(!wrongIds.includes(qId)) wrongIds.push(qId);
    document.getElementById('o'+idx).classList.add('wrong');
    document.getElementById('o'+correct).classList.add('correct');
    const correctText=pool[current].a[correct];
    fb.className='feedback wrong';
    fb.innerHTML=`❌ <strong>Błąd.</strong> Poprawna: <span style="color:#34d399">${correctText}</span>`;
  }
  document.getElementById('btn-next').disabled=false;
  updateStats();
}

function next(){current++;render();}

function showResult(){
  document.getElementById('quiz-area').innerHTML='';
  const r=document.getElementById('result');
  r.classList.add('on');
  const total=pool.length, pct=Math.round(nOK/total*100);
  document.getElementById('r-score').textContent=`${nOK}/${total}`;
  document.getElementById('r-pct').textContent=`${pct}% poprawnych odpowiedzi`;
  let emoji,msg;
  if(pct>=90){emoji='🏆';msg='Wybitnie! Jesteś gotowy na egzamin.';}
  else if(pct>=75){emoji='🎯';msg='Bardzo dobrze! Przejrzyj błędne i spróbuj ponownie.';}
  else if(pct>=60){emoji='📚';msg='Dobry start. Użyj przycisku "Powtórz błędne" żeby ćwiczyć słabsze tematy.';}
  else{emoji='💪';msg='Warto powtórzyć materiał. Kliknij "Powtórz błędne" — ćwicz tylko to co nie wyszło.';}
  document.getElementById('r-emoji').textContent=emoji;
  document.getElementById('r-msg').textContent=msg;
  
  // Show missed questions
  const missed=document.getElementById('missed-list');
  const missedQs=pool.filter(q=>wrongIds.includes(q.id));
  if(missedQs.length>0){
    missed.innerHTML=`<h3>❌ Błędne pytania (${missedQs.length})</h3>`+
      missedQs.map(q=>`<div class="missed-item">
        <strong>${q.q.substring(0,100)}</strong>
        <span>✅ ${q.a[q.correct]}</span>
      </div>`).join('');
  }
  document.getElementById('progress').style.width='100%';
}

restart();
</script>
